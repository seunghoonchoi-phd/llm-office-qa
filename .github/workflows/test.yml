name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-fixtures:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build deliberately-flawed fixtures
        run: |
          python examples/make_bad_powerpoint.py flawed.pptx
          python examples/make_bad_excel.py flawed.xlsx
          python examples/make_bad_word.py  flawed.docx

      - name: Main command must flag the flawed fixtures (exit 1)
        run: |
          set +e
          python check_office_file.py flawed.pptx flawed.xlsx flawed.docx
          code=$?
          set -e
          if [ "$code" -ne 1 ]; then
            echo "::error::python check_office_file.py exited $code, expected 1 (objective defects)"
            exit 1
          fi
          echo "OK: main command correctly exited 1"

      - name: Format-specific commands must flag their flawed fixtures (exit 1)
        run: |
          for cmd in "tools/check_powerpoint.py flawed.pptx" "tools/check_excel.py flawed.xlsx" "tools/check_word.py flawed.docx"; do
            set +e
            python $cmd
            code=$?
            set -e
            if [ "$code" -ne 1 ]; then
              echo "::error::python $cmd exited $code, expected 1 (objective defects)"
              exit 1
            fi
            echo "OK: python $cmd correctly exited 1"
          done
